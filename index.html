<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карта глаукоматологов России</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👁</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Экран пароля -->
<div id="password-screen">
    <div class="password-card">
        <div class="eye-icon">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#2e7bcf" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        </div>
        <h1>Карта глаукоматологов России</h1>
        <p class="subtitle">Информационный ресурс для пациентов</p>
        <form class="password-form" onsubmit="checkPassword(); return false;">
            <input type="password" id="pwd-input" placeholder="Введите пароль" autocomplete="current-password">
            <button type="submit">Войти</button>
        </form>
        <p id="pwd-error" class="error-msg">Неверный пароль. Попробуйте ещё раз.</p>
    </div>
</div>

<!-- Основное приложение -->
<div id="app" style="display:none">
    <header>
        <div class="header-inner">
            <div class="header-title">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#2e7bcf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                    <circle cx="12" cy="12" r="3"/>
                </svg>
                <span>Глаукоматологи России</span>
            </div>
            <a href="https://t.me/mentor_zrenia/1448" target="_blank" class="suggest-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="12" y1="5" x2="12" y2="19"/>
                    <line x1="5" y1="12" x2="19" y2="12"/>
                </svg>
                Предложить врача
            </a>
        </div>
    </header>

    <main>
        <p class="map-hint">Нажмите на город, чтобы увидеть список врачей</p>
        <div class="svg-container">
            <svg id="russia-map" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg">
                <!-- Контур России (упрощённый) -->
                <path id="russia-outline"
                    d="M73,209 L90,158 L120,148 L145,190 L200,148 L290,118 L346,110
                       L450,78 L592,61 L735,110 L870,115 L930,145 L920,200 L890,260
                       L870,315 L825,360 L780,390 L740,408 L695,418 L655,472 L618,462
                       L565,448 L512,390 L440,398 L400,370 L309,370 L247,382 L216,432
                       L170,462 L145,450 L120,428 L111,383 L98,370 L78,310 L73,260 Z"/>
                <!-- Метки городов -->
                <g id="cities"></g>
            </svg>
        </div>
        <p class="map-legend">
            <svg width="10" height="10" viewBox="0 0 10 10"><circle cx="5" cy="5" r="5" fill="#2e7bcf"/></svg>
            — город с врачами-глаукоматологами
        </p>
    </main>

    <!-- Оверлей -->
    <div id="panel-overlay" onclick="closePanel()"></div>

    <!-- Боковая панель -->
    <div id="doctor-panel">
        <div class="panel-header">
            <div>
                <div class="panel-city-label">Врачи-глаукоматологи</div>
                <h2 id="panel-title"></h2>
            </div>
            <button class="close-panel-btn" onclick="closePanel()" aria-label="Закрыть">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
            </button>
        </div>
        <div id="panel-content"></div>
        <div class="panel-footer">
            <a href="https://t.me/mentor_zrenia/1448" target="_blank" class="suggest-link">
                Знаете врача в этом городе? Предложите его →
            </a>
        </div>
    </div>
</div>

<script src="app.js"></script>
</body>
</html>
